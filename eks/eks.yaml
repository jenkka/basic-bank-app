apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: dummy-bank
  region: us-east-2

vpc:
  nat:
    gateway: Disable

managedNodeGroups:
  - name: dummy-bank-node
    instanceType: t3.small
    desiredCapacity: 2
    minSize: 1
    maxSize: 2
    volumeSize: 20
    privateNetworking: false
    ssh:
      allow: false
