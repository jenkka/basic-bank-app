name: Deploy to production
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    name: Deploy image
    runs-on: ubuntu-latest

    steps:
      - name: Checks out repository code
        uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4
        with:
           version: 'v1.36.1'
        id: install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v1
        with:
          mask-password: 'true'

      - name: Load secrets and save to app.env
        run: |
          aws secretsmanager get-secret-value \
            --secret-id dummy_bank \
            --region us-east-2 \
            --query SecretString --output text \
          | jq -r 'to_entries|map("\(.key)=\(.value)")|.[]' > app.env

      - name: Build, tag, and push docker image to Amazon ECR Public
        env:
          REGISTRY: ${{ steps.login-ecr-public.outputs.registry }}
          REPOSITORY: dummybank
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -t $REGISTRY/$REPOSITORY:latest .
          docker push -a $REGISTRY/$REPOSITORY

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name dummy-bank --region us-east-2

      - name: Deploy image to Amazon EKS
        run: |
          kubectl apply -f eks/aws-auth.yaml
          kubectl apply -f eks/deployment.yaml
          kubectl apply -f eks/service.yaml
          kubectl apply -f eks/ingress.yaml
          kubectl rollout restart deployment dummy-bank-api-deployment
          kubectl rollout status deployment dummy-bank-api-deployment --timeout=5m
